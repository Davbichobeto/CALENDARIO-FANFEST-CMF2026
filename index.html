<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIO EVENTOS FIFA</title>
    <style>
        :root {
            --bg-color: #050505;
            --gold: #D4AF37;
            --gold-dim: #8b7322;
            --text-color: #f5f5f5;
            --line-thickness: 1px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--gold);
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: var(--line-thickness) solid var(--gold);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        /* Vistas */
        #calendar-view { display: block; }
        #detail-view { display: none; max-width: 600px; margin: 0 auto; }

        /* Calendario Grid */
        .month-container { margin-bottom: 40px; }
        .month-title {
            color: var(--gold);
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
            border-top: var(--line-thickness) solid var(--gold);
            border-left: var(--line-thickness) solid var(--gold);
        }

        .day-header {
            text-align: center;
            padding: 10px;
            color: var(--gold);
            border-right: var(--line-thickness) solid var(--gold);
            border-bottom: var(--line-thickness) solid var(--gold);
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .day-cell {
            min-height: 80px;
            padding: 5px;
            border-right: var(--line-thickness) solid var(--gold);
            border-bottom: var(--line-thickness) solid var(--gold);
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        .day-cell.empty {
            cursor: default;
        }
        .day-cell.empty:hover {
            background-color: transparent;
        }

        .date-num {
            font-size: 1.1em;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .event-cat {
            font-size: 0.8em;
            font-weight: bold;
            color: var(--bg-color);
            background-color: var(--gold);
            padding: 2px 5px;
            border-radius: 2px;
            display: inline-block;
            align-self: flex-start;
        }

        .event-libre {
            background-color: #555;
            color: #fff;
        }

        /* Vista de Detalle */
        .detail-card {
            border: var(--line-thickness) solid var(--gold);
            padding: 30px;
            position: relative;
        }

        .detail-card h2 {
            color: var(--gold);
            margin-top: 0;
            border-bottom: var(--line-thickness) solid var(--gold);
            padding-bottom: 10px;
            font-weight: 400;
        }

        .detail-item {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: var(--gold-dim);
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1em;
        }

        .btn-back {
            background-color: transparent;
            color: var(--gold);
            border: var(--line-thickness) solid var(--gold);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: var(--gold);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <h1>CALENDARIO EVENTOS FIFA</h1>

    <div id="calendar-view">
        <div class="month-container">
            <div class="month-title">JUNIO 2026</div>
            <div class="calendar-grid" id="grid-june">
                <div class="day-header">Lunes</div>
                <div class="day-header">Martes</div>
                <div class="day-header">Miércoles</div>
                <div class="day-header">Jueves</div>
                <div class="day-header">Viernes</div>
                <div class="day-header">Sábado</div>
                <div class="day-header">Domingo</div>
                </div>
        </div>

        <div class="month-container">
            <div class="month-title">JULIO 2026</div>
            <div class="calendar-grid" id="grid-july">
                <div class="day-header">Lunes</div>
                <div class="day-header">Martes</div>
                <div class="day-header">Miércoles</div>
                <div class="day-header">Jueves</div>
                <div class="day-header">Viernes</div>
                <div class="day-header">Sábado</div>
                <div class="day-header">Domingo</div>
                </div>
        </div>
    </div>

    <div id="detail-view">
        <button class="btn-back" onclick="showCalendar()">&#8592; Regresar al Calendario</button>
        <br><br>
        <div class="detail-card">
            <h2 id="detail-date-title">Fecha</h2>
            
            <div class="detail-item">
                <span class="detail-label">Categoría / Afluencia</span>
                <span class="detail-value" id="detail-cat"></span>
            </div>
            
            <div class="detail-item">
                <span class="detail-label">Escenario</span>
                <span class="detail-value" id="detail-stage"></span>
            </div>

            <div class="detail-item">
                <span class="detail-label">Evento / Partido</span>
                <span class="detail-value" id="detail-event"></span>
            </div>

            <div class="detail-item">
                <span class="detail-label">Artista</span>
                <span class="detail-value" id="detail-artist"></span>
            </div>

            <div class="detail-item">
                <span class="detail-label">Cantidad de Elementos</span>
                <span class="detail-value" id="detail-elements"></span>
            </div>
        </div>
    </div>

    <script>
        const categoryData = {
            "SS": { stage: "Escenario SS", elements: "460 elementos (100 UCM)", afluencia: "MÁXIMA afluencia" },
            "AA": { stage: "Escenario LIVE", elements: "300 elementos (100 UCM)", afluencia: "3/4 del personal" },
            "A": { stage: "Escenario FOOD & SOUL", elements: "100 elementos (50 UCM)", afluencia: "1/4 de afluencia" },
            "LIBRE": { stage: "N/A", elements: "0 elementos", afluencia: "Sin evento" }
        };

        const eventData = {
            "2026-06-11": { cat: "AA", event: "INAGURACION", artist: "LA LEYENDA" },
            "2026-06-12": { cat: "AA", event: "JUEGOS DE GPOS", artist: "DE PARRANDA" },
            "2026-06-13": { cat: "SS", event: "JUEGOS DE GPOS", artist: "CHAYANNE" },
            "2026-06-14": { cat: "AA", event: "SUECIA VS TUNEZ", artist: "CABALLO DORADO" },
            "2026-06-15": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-06-16": { cat: "AA", event: "JUEGOS DE GPOS", artist: "TOY SELECTAH" },
            "2026-06-17": { cat: "SS", event: "SUDAFRICA VS KOREA", artist: "GRUPO FIRME" },
            "2026-06-18": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-06-19": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-06-20": { cat: "AA", event: "JUEGOS DE GPOS", artist: "LOS CADETES DE LINARES" },
            "2026-06-21": { cat: "SS", event: "DIECISEISAVOS", artist: "ENRIQUE IGLESIAS" },
            "2026-06-22": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-06-23": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-06-24": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-06-25": { cat: "AA", event: "MEXICO VS KOREA", artist: "GASNITALLICA" },
            "2026-06-26": { cat: "AA", event: "JUEGOS DE GPOS", artist: "COSTUMBRE" },
            "2026-06-27": { cat: "AA", event: "TUNEZ VS JAPON", artist: "EL GRAN SILENCIO" },
            "2026-06-28": { cat: "SS", event: "JUEGOS DE GPOS", artist: "IAMGINE DRAGONS" },
            "2026-06-29": { cat: "AA", event: "DIECISEISAVOS", artist: "THE CLSSX" },
            "2026-06-30": { cat: "AA", event: "DIECISEISAVOS", artist: "3BALL MTY" },
            
            "2026-07-01": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-07-02": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A" },
            "2026-07-03": { cat: "AA", event: "JUEGOS DE GPOS", artist: "JUMBO" },
            "2026-07-04": { cat: "AA", event: "OCTAVOS", artist: "N/A" },
            "2026-07-05": { cat: "AA", event: "OCTAVOS", artist: "LOS PAYASONICOS" },
            "2026-07-06": { cat: "A", event: "OCTAVOS", artist: "N/A" },
            "2026-07-07": { cat: "A", event: "OCTAVOS", artist: "N/A" },
            "2026-07-08": { cat: "LIBRE", event: "DÍA LIBRE", artist: "N/A" },
            "2026-07-09": { cat: "A", event: "CUARTOS", artist: "MC DAVO" },
            "2026-07-10": { cat: "AA", event: "CUARTOS", artist: "LA SONORA DINAMITA" },
            "2026-07-11": { cat: "AA", event: "CUARTOS", artist: "N/A" },
            "2026-07-12": { cat: "LIBRE", event: "DÍA LIBRE", artist: "N/A" },
            "2026-07-13": { cat: "LIBRE", event: "DÍA LIBRE", artist: "N/A" },
            "2026-07-14": { cat: "A", event: "SEMIFINALES", artist: "N/A" },
            "2026-07-15": { cat: "A", event: "SEMIFINALES", artist: "N/A" },
            "2026-07-16": { cat: "LIBRE", event: "DÍA LIBRE", artist: "N/A" },
            "2026-07-17": { cat: "LIBRE", event: "DÍA LIBRE", artist: "N/A" },
            "2026-07-18": { cat: "AA", event: "TERCER LUGAR", artist: "KEVIS MAIKY" },
            "2026-07-19": { cat: "SS", event: "FINAL CMF2026", artist: "DPR IAN" }
        };

        function renderCalendar() {
            const juneGrid = document.getElementById('grid-june');
            const julyGrid = document.getElementById('grid-july');
            
            // Junio 2026 empieza en Lunes
            let juneHTML = '';
            for (let i = 1; i <= 30; i++) {
                let dateKey = `2026-06-${i.toString().padStart(2, '0')}`;
                let data = eventData[dateKey];
                
                if (data) {
                    juneHTML += `<div class="day-cell" onclick="showDetail('${dateKey}')">
                        <span class="date-num">${i}</span>
                        <span class="event-cat ${data.cat === 'LIBRE' ? 'event-libre' : ''}">${data.cat}</span>
                    </div>`;
                } else {
                    juneHTML += `<div class="day-cell empty"><span class="date-num">${i}</span></div>`;
                }
            }
            juneGrid.innerHTML += juneHTML;

            // Julio 2026 empieza en Miércoles. (Agregamos 2 celdas vacías al principio)
            let julyHTML = '<div class="day-cell empty"></div><div class="day-cell empty"></div>';
            for (let i = 1; i <= 31; i++) {
                let dateKey = `2026-07-${i.toString().padStart(2, '0')}`;
                let data = eventData[dateKey];
                
                if (data) {
                    julyHTML += `<div class="day-cell" onclick="showDetail('${dateKey}')">
                        <span class="date-num">${i}</span>
                        <span class="event-cat ${data.cat === 'LIBRE' ? 'event-libre' : ''}">${data.cat}</span>
                    </div>`;
                } else {
                    julyHTML += `<div class="day-cell empty"><span class="date-num">${i}</span></div>`;
                }
            }
            // Llenar espacios sobrantes de julio (termina en viernes, sobran 2 para completar la grid)
            julyHTML += '<div class="day-cell empty"></div><div class="day-cell empty"></div>';
            julyGrid.innerHTML += julyHTML;
        }

        function showDetail(dateKey) {
            const data = eventData[dateKey];
            if (!data) return;

            const catInfo = categoryData[data.cat];
            const dateObj = new Date(dateKey + "T12:00:00"); 
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('es-MX', options).toUpperCase();

            document.getElementById('detail-date-title').innerText = formattedDate;
            document.getElementById('detail-cat').innerText = `${data.cat} - ${catInfo.afluencia}`;
            document.getElementById('detail-stage').innerText = catInfo.stage;
            document.getElementById('detail-event').innerText = data.event;
            document.getElementById('detail-artist').innerText = data.artist;
            document.getElementById('detail-elements').innerText = catInfo.elements;

            document.getElementById('calendar-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
        }

        function showCalendar() {
            document.getElementById('calendar-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
