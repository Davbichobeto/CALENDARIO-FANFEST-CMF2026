<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIO FANFEST CMF2026</title>
    <style>
        :root {
            --bg-color: #050505;
            --gold: #D4AF37;
            --gold-dim: #8b7322;
            --text-color: #f5f5f5;
            --line-thickness: 1px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 5px; 
            overflow-x: hidden;
        }

        h1 {
            color: var(--gold);
            background-color: #222; 
            text-align: center;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: var(--line-thickness) solid var(--gold);
            padding: 5px;
            border-radius: 5px;
            margin: 5px auto 10px auto;
            max-width: 900px;
            font-size: 1.2em;
        }

        #calendar-view { 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        #detail-view { display: none; max-width: 600px; margin: 0 auto; }

        .month-container { width: 100%; }
        .month-title {
            color: var(--gold);
            font-size: 1em;
            margin-bottom: 3px;
            font-weight: 400;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: var(--line-thickness) solid var(--gold);
            border-left: var(--line-thickness) solid var(--gold);
        }

        .day-header {
            text-align: center;
            padding: 2px;
            color: var(--gold);
            border-right: var(--line-thickness) solid var(--gold);
            border-bottom: var(--line-thickness) solid var(--gold);
            font-weight: bold;
            font-size: 0.7em;
            text-transform: uppercase;
            background-color: #111;
        }

        .day-cell {
            min-height: 42px; 
            padding: 2px;
            border-right: var(--line-thickness) solid var(--gold);
            border-bottom: var(--line-thickness) solid var(--gold);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Días con evento cambiados a color naranja fuerte */
        .day-cell.SS { background-color: #FF5500; }    
        .day-cell.AA { background-color: #FF5500; }    
        .day-cell.A { background-color: #FF5500; }     
        .day-cell.LIBRE { background-color: #609; } 

        .day-cell.empty { cursor: default; background-color: transparent; }

        /* Clase para colocar la línea transversal en días cerrados */
        .past-day::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom right, transparent 48%, rgba(255, 255, 255, 0.85) 49%, rgba(255, 255, 255, 0.85) 51%, transparent 52%);
            pointer-events: none;
        }

        .date-num {
            font-size: 0.85em;
            color: var(--gold);
            font-weight: bold;
            z-index: 2;
        }

        .event-cat {
            font-size: 0.65em;
            font-weight: bold;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            padding: 1px 3px;
            border-radius: 2px;
            position: absolute;
            top: 2px;
            right: 2px;
            z-index: 2;
        }

        .time-range {
            font-size: 0.6em;
            color: #ddd;
            text-align: right;
            line-height: 1;
            margin-top: 2px;
            margin-bottom: 2px;
            z-index: 2;
        }

        .elements-num {
            font-size: 0.8em;
            font-weight: bold;
            text-align: right;
            color: #fff;
            width: 100%;
            z-index: 2;
        }

        .detail-card {
            border: var(--line-thickness) solid var(--gold);
            padding: 20px;
            background-color: #111;
        }
        
        .btn-back {
            background-color: #000080; 
            color: #fff; 
            border: var(--line-thickness) solid var(--gold);
            padding: 5px 15px;
            cursor: pointer;
            margin-bottom: 10px;
            border-radius: 3px;
        }
        .btn-back:hover {
            background-color: #000050; 
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <img src="escudo_fc.jpg" alt="Escudo Fuerza Civil" style="max-height: 50px;">
    </div>
    
    <h1>CALENDARIO FANFEST CMF2026</h1>

    <div id="calendar-view">
        <div class="month-container">
            <div class="month-title">JUNIO 2026</div>
            <div class="calendar-grid" id="grid-june">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mié</div>
                <div class="day-header">Jue</div>
                <div class="day-header">Vie</div>
                <div class="day-header">Sáb</div>
                <div class="day-header">Dom</div>
            </div>
        </div>

        <div class="month-container">
            <div class="month-title">JULIO 2026</div>
            <div class="calendar-grid" id="grid-july">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mié</div>
                <div class="day-header">Jue</div>
                <div class="day-header">Vie</div>
                <div class="day-header">Sáb</div>
                <div class="day-header">Dom</div>
            </div>
        </div>
    </div>

    <div id="detail-view">
        <button class="btn-back" onclick="showCalendar()">← REGRESAR</button>
        <div class="detail-card">
            <h2 id="detail-date-title" style="color: var(--gold); font-weight: 400; font-size: 1.1em; border-bottom: 1px solid var(--gold); padding-bottom: 5px;"></h2>
            <p><b style="color: var(--gold-dim)">HORARIO:</b> <span id="detail-time"></span></p>
            <p><b style="color: var(--gold-dim)">CATEGORÍA:</b> <span id="detail-cat"></span></p>
            <p><b style="color: var(--gold-dim)">ESCENARIO:</b> <span id="detail-stage"></span></p>
            <p><b style="color: var(--gold-dim)">EVENTO:</b> <span id="detail-event"></span></p>
            <p><b style="color: var(--gold-dim)">ARTISTA:</b> <span id="detail-artist"></span></p>
            <p><b style="color: var(--gold-dim)">ELEMENTOS:</b> <span id="detail-elements"></span></p>
        </div>
    </div>

    <script>
        const categoryData = {
            "SS": { stage: "Escenario SS", elements: "500 elementos", num: "500" },
            "AA": { stage: "Escenario LIVE", elements: "300 elementos", num: "300" },
            "A": { stage: "Escenario FOOD & SOUL", elements: "100 elementos", num: "100" },
            "LIBRE": { stage: "N/A", elements: "0 elementos", num: "" }
        };

        const eventData = {
            "2026-06-11": { cat: "AA", event: "MÉXICO VS SUDÁFRICA / REP. DE COREA VS REP. CHECA", artist: "LA LEYENDA", ap: "12:00", ci: "23:00" },
            "2026-06-12": { cat: "AA", event: "CANADÁ VS BOSNIA / ESTADOS UNIDOS VS PARAGUAY", artist: "DE PARRANDA", ap: "17:00", ci: "00:00" },
            "2026-06-13": { cat: "SS", event: "TRANSMISIÓN DE PARTIDOS DEL DÍA", artist: "CHAYANNE (21:00 HRS)", ap: "15:00", ci: "01:00" },
            "2026-06-14": { cat: "AA", event: "SUECIA VS TÚNEZ (ESTADIO MONTERREY)", artist: "CABALLO DORADO", ap: "13:00", ci: "23:00" },
            "2026-06-15": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "15:30", ci: "21:30" },
            "2026-06-16": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "12:30", ci: "21:30" },
            "2026-06-17": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "13:30", ci: "22:30" },
            "2026-06-18": { cat: "AA", event: "MÉXICO VS COREA DEL SUR", artist: "GENITALLICA", ap: "15:00", ci: "23:30" },
            "2026-06-19": { cat: "AA", event: "TRANSMISIÓN DE PARTIDOS DEL DÍA", artist: "LA COSTUMBRE", ap: "15:00", ci: "23:30" },
            "2026-06-20": { cat: "AA", event: "TÚNEZ VS JAPÓN (ESTADIO MONTERREY)", artist: "EL GRAN SILENCIO", ap: "13:00", ci: "01:00" },
            "2026-06-21": { cat: "SS", event: "ESPAÑA VS ARABIA SAUDITA", artist: "IMAGINE DRAGONS (20:00 HRS)", ap: "12:00", ci: "22:00" },
            "2026-06-22": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "13:30", ci: "20:30" },
            "2026-06-23": { cat: "AA", event: "TRANSMISIÓN DE PARTIDOS DEL DÍA", artist: "TOY SELECTAH", ap: "13:00", ci: "01:00" },
            "2026-06-24": { cat: "SS", event: "SUDÁFRICA VS REPÚBLICA DE COREA", artist: "GRUPO FIRME (21:45 HRS)", ap: "15:00", ci: "00:30" },
            "2026-06-25": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "13:30", ci: "22:30" },
            "2026-06-26": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "12:30", ci: "23:30" },
            "2026-06-27": { cat: "AA", event: "TRANSMISIÓN DE PARTIDOS DEL DÍA", artist: "LOS CADETES DE LINARES", ap: "14:00", ci: "00:30" },
            "2026-06-28": { cat: "SS", event: "TRANSMISIÓN DE PARTIDOS DEL DÍA", artist: "ENRIQUE IGLESIAS (19:30 HRS)", ap: "12:00", ci: "21:30" },
            "2026-06-29": { cat: "AA", event: "OCTAVOS DE FINAL: 1° GRUPO F VS 2° GRUPO C", artist: "THE CLSSX", ap: "17:30", ci: "23:30" },
            "2026-06-30": { cat: "AA", event: "TRANSMISIÓN DE PARTIDOS DEL DÍA", artist: "3BALLMTY", ap: "18:00", ci: "23:30" },
            "2026-07-01": { cat: "A", event: "JUEGOS DE GPOS", artist: "N/A", ap: "13:30", ci: "20:30" },
            "2026-07-02": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "EL GRAN SILENCIO", ap: "12:30", ci: "19:30" },
            "2026-07-03": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "JUMBO", ap: "15:00", ci: "00:00" },
            "2026-07-04": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "EL MALILLA", ap: "14:00", ci: "01:00" },
            "2026-07-05": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "LOS PAYASÓNICOS", ap: "13:00", ci: "23:00" },
            "2026-07-06": { cat: "A", event: "ÚNICAMENTE TRANSMISIÓN DE PARTIDO", artist: "N/A", ap: "12:30", ci: "20:30" },
            "2026-07-07": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "LA COSTUMBRE", ap: "13:30", ci: "23:30" },
            "2026-07-08": { cat: "LIBRE", event: "DÍA DE DESCANSO", artist: "N/A" },
            "2026-07-09": { cat: "A", event: "ÚNICAMENTE TRANSMISIÓN DE PARTIDO", artist: "N/A", ap: "13:30", ci: "16:30" },
            "2026-07-10": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "MC DAVO", ap: "12:00", ci: "23:00" },
            "2026-07-11": { cat: "AA", event: "TRANSMISIÓN DE PARTIDO Y SHOW MUSICAL", artist: "LA SONORA DINAMITA", ap: "14:00", ci: "01:00" },
            "2026-07-12": { cat: "LIBRE", event: "DÍA DE DESCANSO", artist: "N/A" },
            "2026-07-13": { cat: "LIBRE", event: "DÍA DE DESCANSO", artist: "N/A" },
            "2026-07-14": { cat: "A", event: "TRANSMISIÓN DE SEMIFINALES", artist: "N/A", ap: "12:30", ci: "15:30" },
            "2026-07-15": { cat: "A", event: "TRANSMISIÓN DE SEMIFINALES", artist: "N/A", ap: "12:30", ci: "15:30" },
            "2026-07-16": { cat: "LIBRE", event: "DÍA DE DESCANSO", artist: "N/A" },
            "2026-07-17": { cat: "LIBRE", event: "DÍA DE DESCANSO", artist: "N/A" },
            "2026-07-18": { cat: "AA", event: "PARTIDO POR EL TERCER LUGAR Y SHOW MUSICAL", artist: "KEVIS & MAYKYY", ap: "14:00", ci: "00:30" },
            "2026-07-19": { cat: "AA", event: "GRAN FINAL Y CLAUSURA OFICIAL", artist: "ARTISTA SORPRESA", ap: "11:30", ci: "00:30" }
        };

        function renderCalendar() {
            const juneGrid = document.getElementById('grid-june');
            const julyGrid = document.getElementById('grid-july');
            
            // Calculamos la fecha actual dinámicamente para aplicar la línea transversal
            const today = new Date();
            const currentDateStr = today.toISOString().split('T')[0];

            // Junio (Lunes)
            for (let i = 1; i <= 30; i++) {
                let dateKey = `2026-06-${i.toString().padStart(2, '0')}`;
                let data = eventData[dateKey];
                let cell = document.createElement('div');
                cell.className = data ? `day-cell ${data.cat}` : "day-cell";
                
                if (dateKey < currentDateStr) {
                    cell.classList.add('past-day');
                }

                if(data) cell.onclick = () => showDetail(dateKey);
                
                cell.innerHTML = `<span class="date-num">${i}</span>`;
                if(data) {
                    cell.innerHTML += `<span class="event-cat">${data.cat}</span>`;
                    
                    let timeText = data.cat === 'LIBRE' ? 'Sin actividad' : `${data.ap} - ${data.ci}`;
                    cell.innerHTML += `<span class="time-range">${timeText}</span>`;

                    if(categoryData[data.cat].num !== "") {
                        cell.innerHTML += `<span class="elements-num">👮‍♂️ ${categoryData[data.cat].num}</span>`;
                    }
                }
                juneGrid.appendChild(cell);
            }

            // Julio (Miércoles -> 2 vacíos)
            for(let j=0; j<2; j++) julyGrid.appendChild(Object.assign(document.createElement('div'), {className: "day-cell empty"}));
            for (let i = 1; i <= 31; i++) {
                let dateKey = `2026-07-${i.toString().padStart(2, '0')}`;
                let data = eventData[dateKey];
                let cell = document.createElement('div');
                cell.className = data ? `day-cell ${data.cat}` : "day-cell";
                
                if (dateKey < currentDateStr) {
                    cell.classList.add('past-day');
                }

                if(data) cell.onclick = () => showDetail(dateKey);
                
                cell.innerHTML = `<span class="date-num">${i}</span>`;
                if(data) {
                    cell.innerHTML += `<span class="event-cat">${data.cat}</span>`;
                    
                    let timeText = data.cat === 'LIBRE' ? 'Sin actividad' : `${data.ap} - ${data.ci}`;
                    cell.innerHTML += `<span class="time-range">${timeText}</span>`;

                    if(categoryData[data.cat].num !== "") {
                        cell.innerHTML += `<span class="elements-num">👮‍♂️ ${categoryData[data.cat].num}</span>`;
                    }
                }
                julyGrid.appendChild(cell);
            }
        }

        function showDetail(dateKey) {
            const data = eventData[dateKey];
            const catInfo = categoryData[data.cat];
            const dateObj = new Date(dateKey + "T12:00:00");
            
            document.getElementById('detail-date-title').innerText = dateObj.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
            
            // Detalle del horario
            if (data.cat === 'LIBRE') {
                document.getElementById('detail-time').innerText = "Sin actividad programada";
            } else {
                document.getElementById('detail-time').innerText = `Apertura ${data.ap} hrs / Cierre ${data.ci} hrs`;
            }

            document.getElementById('detail-cat').innerText = data.cat;
            document.getElementById('detail-stage').innerText = catInfo.stage;
            document.getElementById('detail-event').innerText = data.event;
            document.getElementById('detail-artist').innerText = data.artist;
            document.getElementById('detail-elements').innerText = catInfo.elements;
            
            document.getElementById('calendar-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
        }

        function showCalendar() {
            document.getElementById('calendar-view').style.display = 'flex';
            document.getElementById('detail-view').style.display = 'none';
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
